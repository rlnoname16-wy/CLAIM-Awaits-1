name: Build Android APK (Buildozer)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake \
            libffi-dev libssl-dev \
            python3-dev

      - name: Set up Android SDK tools (sdkmanager)
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses (no broken pipe failure)
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager --licenses
          status=${PIPESTATUS[1]}
          exit $status

      - name: Install Android SDK packages (includes AIDL)
        shell: bash
        run: |
          set -e
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

      - name: Locate AIDL + force Buildozer to use this SDK/NDK
        shell: bash
        run: |
          set -e
          SDKROOT="${ANDROID_SDK_ROOT:-}"
          test -n "$SDKROOT"

          AIDL_PATH="$(find "$SDKROOT/build-tools" -type f -name aidl | sort -V | tail -n 1)"
          echo "AIDL_PATH=$AIDL_PATH"
          test -n "$AIDL_PATH"
          test -x "$AIDL_PATH"

          echo "$(dirname "$AIDL_PATH")" >> "$GITHUB_PATH"
          echo "$SDKROOT/platform-tools" >> "$GITHUB_PATH"

          python3 - <<'PY'
          import os, re, pathlib
          sdk = os.environ["ANDROID_SDK_ROOT"]
          ndk = os.path.join(sdk, "ndk", "25.2.9519653")
          p = pathlib.Path("buildozer.spec")
          s = p.read_text(encoding="utf-8")

          def upsert(key, val, text):
              pat = re.compile(rf"^\s*{re.escape(key)}\s*=.*$", re.M)
              if pat.search(text):
                  return pat.sub(f"{key} = {val}", text)
              m = re.search(r"^$$buildozer$$\s*$", text, re.M)
              ins = f"{key} = {val}\n"
              return text[:m.start()] + ins + text[m.start():] if m else text + "\n" + ins

          s = upsert("android.sdk_path", sdk, s)
          s = upsert("android.ndk_path", ndk, s)
          p.write_text(s, encoding="utf-8")
          print("Patched buildozer.spec (android.sdk_path + android.ndk_path)")
          PY

      - name: Install Buildozer + Cython
        run: |
          python -m pip install --upgrade pip
          python -m pip install buildozer cython

      - name: Build APK (debug)
        shell: bash
        run: |
          set -e
          which aidl
          aidl --version || true
          buildozer -v android debug

      - name: Collect APK(s)
        shell: bash
        run: |
          set -e
          mkdir -p dist
          find . -type f -name "*.apk" -print
          find . -type f -name "*.apk" -exec cp -v {} dist/ \;
          ls -la dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: dist/*.apk
          if-no-files-found: error
