name: Build Android APK (Buildozer)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake \
            libffi-dev libssl-dev \
            python3-dev

      - name: Set up Android SDK tools (sdkmanager)
        uses: android-actions/setup-android@v3

      - name: Prepare Buildozer SDK + accept licenses + install Build-Tools (AIDL)
        shell: bash
        run: |
          set -e

          SDKROOT="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDKROOT"

          # Accept licenses for THIS sdk_root (avoid "yes: Broken pipe" failing the step)
          set +o pipefail
          yes | sdkmanager --sdk_root="$SDKROOT" --licenses
          status=${PIPESTATUS[1]}
          set -o pipefail
          exit $status

          # Install packages into the same sdk_root Buildozer will use
          sdkmanager --sdk_root="$SDKROOT" --install \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "build-tools;37.0.0" \
            "ndk;25.2.9519653"

          ls -la "$SDKROOT/build-tools"

      - name: Force Buildozer to use Buildozer SDK/NDK + ensure aidl on PATH
        shell: bash
        run: |
          set -e
          SDKROOT="$HOME/.buildozer/android/platform/android-sdk"
          NDKROOT="$SDKROOT/ndk/25.2.9519653"

          AIDL_PATH="$(find "$SDKROOT/build-tools" -type f -name aidl | sort -V | tail -n 1)"
          echo "AIDL_PATH=$AIDL_PATH"
          test -n "$AIDL_PATH"
          test -x "$AIDL_PATH"

          echo "$(dirname "$AIDL_PATH")" >> "$GITHUB_PATH"
          echo "$SDKROOT/platform-tools" >> "$GITHUB_PATH"

          python3 - <<'PY'
          import os, re, pathlib
          sdk = os.path.expanduser("~/.buildozer/android/platform/android-sdk")
          ndk = sdk + "/ndk/25.2.9519653"
          p = pathlib.Path("buildozer.spec")
          s = p.read_text(encoding="utf-8")

          def upsert(key, val, text):
              pat = re.compile(rf"^\s*{re.escape(key)}\s*=.*$", re.M)
              if pat.search(text):
                  return pat.sub(f"{key} = {val}", text)
              m = re.search(r"^$$buildozer$$\s*$", text, re.M)
              ins = f"{key} = {val}\n"
              return text[:m.start()] + ins + text[m.start():] if m else text + "\n" + ins

          s = upsert("android.sdk_path", sdk, s)
          s = upsert("android.ndk_path", ndk, s)
          p.write_text(s, encoding="utf-8")
          print("Patched buildozer.spec to use Buildozer SDK/NDK paths")
          PY

      - name: Install Buildozer + Cython
        run: |
          python -m pip install --upgrade pip
          python -m pip install buildozer cython

      - name: Build APK (debug)
        shell: bash
        run: |
          set -e
          which aidl
          aidl --version || true
          buildozer -v android debug

      - name: Collect APK(s)
        shell: bash
        run: |
          set -e
          mkdir -p dist
          find . -type f -name "*.apk" -print
          find . -type f -name "*.apk" -exec cp -v {} dist/ \;
          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: dist/*.apk
          if-no-files-found: error
