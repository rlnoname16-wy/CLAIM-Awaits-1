name: Build Android APK (Buildozer)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake \
            libffi-dev libssl-dev \
            python3-dev

      - name: Set up Android SDK tools
        uses: android-actions/setup-android@v3

      - name: Make Buildozer-compatible sdkmanager path (tools/bin)
        shell: bash
        run: |
          set -e
          mkdir -p "$ANDROID_SDK_ROOT/tools/bin"
          ln -sf "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"
          test -x "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"

      - name: Accept SDK licenses (no broken pipe failure)
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager --licenses
          status=${PIPESTATUS[1]}
          exit $status

      - name: Install Android packages (AIDL is in Build-Tools)
        shell: bash
        run: |
          set -e
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"
          test -x "$ANDROID_SDK_ROOT/build-tools/33.0.2/aidl"

      - name: Install Buildozer + Cython
        run: |
          python -m pip install --upgrade pip
          python -m pip install buildozer cython

      - name: Build APK (debug)
        shell: bash
        run: |
          set -e
          export PATH="$ANDROID_SDK_ROOT/build-tools/33.0.2:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          aidl --version || true
          buildozer -v android debug

      - name: Collect APK(s)
        shell: bash
        run: |
          set -e
          mkdir -p dist
          find . -type f -name "*.apk" -print
          find . -type f -name "*.apk" -exec cp -v {} dist/ \;
          ls -la dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: dist/*.apk
          if-no-files-found: error
