name: Build Android APK (Buildozer)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Set up Java 17 (sdkmanager needs this)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake \
            libffi-dev libssl-dev \
            python3-dev

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK/NDK + ensure aidl + build APK
        shell: bash
        run: |
          set -euo pipefail

          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

          sdkmanager --install \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

          # Accept licenses WITHOUT failing on "yes: Broken pipe"
          set +o pipefail
          yes | sdkmanager --licenses
          exit ${PIPESTATUS[1]}

          export ANDROIDSDK="$ANDROID_SDK_ROOT"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"

          export PATH="$ANDROID_SDK_ROOT/build-tools/33.0.2:$PATH"
          test -x "$ANDROID_SDK_ROOT/build-tools/33.0.2/aidl"
          aidl --version || true

          python -m pip install --upgrade pip
          python -m pip install buildozer cython

          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: |
            bin/*.apk
            .buildozer/android/platform/build-*/outputs/apk/debug/*.apk
            .buildozer/android/platform/build-*/outputs/apk/release/*.apk
          if-no-files-found: error
