name: Build Android APK (Buildozer)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake \
            libffi-dev libssl-dev \
            python3-dev

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages (aidl is in build-tools)
        shell: bash
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

      - name: Accept licenses (avoid broken pipe)
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager --licenses
          exit ${PIPESTATUS[1]}

      - name: Export ANDROIDSDK + add aidl to PATH (persist)
        shell: bash
        run: |
          echo "ANDROIDSDK=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          AIDL_PATH="$(find "$ANDROID_SDK_ROOT/build-tools" -type f -name aidl | sort -V | tail -n 1)"
          echo "AIDL_PATH=$AIDL_PATH"
          test -n "$AIDL_PATH"
          echo "PATH=$(dirname "$AIDL_PATH"):$PATH" >> "$GITHUB_ENV"

      - name: Install Buildozer + Cython
        run: |
          python -m pip install --upgrade pip
          python -m pip install buildozer cython

      - name: Build APK
        shell: bash
        run: |
          which aidl
          aidl --version || true
          buildozer -v android debug

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
