name: Build Android APK (Buildozer)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake \
            libffi-dev libssl-dev \
            python3-dev

      - name: Set up Android SDK tools (sdkmanager)
        uses: android-actions/setup-android@v3

      - name: Prepare Buildozer SDK folder (clean)
        shell: bash
        run: |
          set -e
          SDKROOT="$HOME/.buildozer/android/platform/android-sdk"
          rm -rf "$SDKROOT"
          mkdir -p "$SDKROOT"
          echo "SDKROOT=$SDKROOT"

      - name: Accept licenses + install Build-Tools/NDK into Buildozer SDK (creates aidl)
        shell
