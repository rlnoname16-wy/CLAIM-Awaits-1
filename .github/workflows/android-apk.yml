name: Build Android APK (Buildozer)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake \
            libffi-dev libssl-dev \
            python3-dev

      - name: Set up Android SDK (provides sdkmanager)
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages into a fixed SDK folder
        shell: bash
        run: |
          set -e
          SDKROOT="$HOME/android-sdk"
          sdkmanager --sdk_root="$SDKROOT" --install \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.3" \
            "ndk;25.2.9519653"

      - name: Accept Android SDK licenses (no broken pipe failure)
        shell: bash
        run: |
          SDKROOT="$HOME/android-sdk"
          set +o pipefail
          yes | sdkmanager --sdk_root="$SDKROOT" --licenses
          status=${PIPESTATUS[1]}
          exit $status

      - name: Force Buildozer to use that SDK + verify aidl
        shell: bash
        run: |
          set -e
          SDKROOT="$HOME/android-sdk"
          echo "ANDROID_SDK_ROOT=$SDKROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$SDKROOT" >> "$GITHUB_ENV"
          echo "ANDROIDSDK=$SDKROOT" >> "$GITHUB_ENV"
          echo "ANDROIDNDK=$SDKROOT/ndk/25.2.9519653" >> "$GITHUB_ENV"

          test -x "$SDKROOT/build-tools/33.0.3/aidl"
          "$SDKROOT/build-tools/33.0.3/aidl" --version || true

      - name: Install Buildozer + Cython
        run: |
          python -m pip install --upgrade pip
          python -m pip install buildozer cython

      - name: Build APK (debug)
        shell: bash
        run: |
          set -e
          export PATH="$ANDROID_SDK_ROOT/build-tools/33.0.3:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          buildozer -v android debug

      - name: Collect APK(s)
        shell: bash
        run: |
          set -e
          mkdir -p dist
          find . -type f -name "*.apk" -print
          find . -type f -name "*.apk" -exec cp -v {} dist/ \;
          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: dist/*.apk
          if-no-files-found: error
